<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <script src="../theme-loader.js"></script>
    <title>Профиль пользователя</title>
</head>
<body class="search-page-body"> <div class="login-glow"></div> 

    <div class="app-container">
        <aside class="sidebar">
            <a href="../search/search.html"><div class="icon"><img src="../img/search.png" alt="Поиск"></div></a>
            <a href="../profile/profile.html"><div class="icon"><img src="../img/user.png" alt="Профиль"></div></a>
            <a href="../top/top.html"><div class="icon"><img src="../img/stats.png" alt="Топ"></div></a>
            <a href="../settings/settings.html"><div class="icon"><img src="../img/settings.png" alt="Настройки"></div></a>
        </aside>

        <main class="main-content glass-panel">
            <div id="profileView">
                <header class="profile-header-visual">
                    <div class="profile-cover"></div>
                    
                    <div class="profile-main-info">
                        <div class="avatar-container">
                            <div class="profile-avatar-wrapper">
                                <img src="../img/user.png" alt="Аватар" id="displayAvatar">
                            </div>
                            <button class="edit-badge" id="openEditBtn">
                                <img src="../img/settings.png" alt="Edit">
                            </button>
                        </div>

                        <div class="profile-text-data">
                            <h2 class="user-nickname" id="displayNickname">@USER123</h2>
                            <p class="user-role-label" id="displayRole">Программист</p>
                        </div>

                        <div class="profile-social-links">
                            <a href="#" class="social-icon-btn tg-link">
                                <img src="../img/telegram.png" alt="TG">
                            </a>
                            <a href="#" class="social-icon-btn mail-link">
                                <img src="../img/email-heart.png" alt="Email">
                            </a>
                        </div>
                    </div>

                    <hr class="profile-divider">
                </header>

                <section class="gallery-grid">
                    <div class="card-modern">
                        <div class="image-wrapper">
                            <div class="image-placeholder"></div>
                        </div>
                    </div>
                    <div class="card-modern"><div class="image-wrapper"><div class="image-placeholder"></div></div></div>
                    <div class="card-modern"><div class="image-wrapper"><div class="image-placeholder"></div></div></div>
                
        </main>
    </div>

    <div class="login-glow"></div> 

    <div class="app-container">
        </div>
    <div class="modal-overlay" id="profileEditModal" style="display: none;">
        <div class="modal-glass-card">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            
            <div class="login-header">
                <h2>РЕДАКТИРОВАНИЕ</h2>
                <p>Обновите свои данные</p>
            </div>
            
            <form id="editProfileForm">
                <div class="edit-avatar-section">
                    <div class="profile-avatar-wrapper modal-avatar">
                        <img src="../img/user.png" alt="Превью" id="editAvatarPreview">
                    </div>
                    <label for="avatarUpload" class="button-modern secondary-button upload-btn">
                        СМЕНИТЬ ФОТО
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                </div>

                <div class="input-group">
                    <div class="input-modern">
                        <img src="../img/user.png" alt="" class="input-icon">
                        <input type="text" id="editNickname" placeholder="Новый логин (@USER123)">
                    </div>

                    <div class="input-modern">
                        <img src="../img/telegram.png" alt="" class="input-icon">
                        <input type="text" id="editTg" placeholder="Ник в Telegram">
                    </div>

                    <div class="input-modern">
                        <img src="../img/email-heart.png" alt="" class="input-icon">
                        <input type="email" id="editEmail" placeholder="Ваша почта">
                    </div>
                    
                    <div class="input-modern password-field">
                        <img src="../img/lock.png" alt="" class="input-icon">
                        <input type="password" id="editPass" placeholder="Новый пароль (мин. 8 знаков)">
                    </div>

                    <div class="input-modern password-field">
                        <img src="../img/lock.png" alt="" class="input-icon">
                        <input type="password" id="editPassConfirm" placeholder="Повторите пароль">
                    </div>
                </div>
                
                <div class="action-buttons vertical-buttons modal-actions">
                    <button type="submit" class="button-modern submit-button">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Модальное окно просмотра работы -->
<div id="workModal" class="modal-overlay" style="display: none;">
    <div class="modal-work-container">
        <button class="close-modal work-close">&times;</button>
        <div class="work-main">
            <div class="work-media-area">
                <div class="slider-container">
                    <button class="slider-btn prev">&#10094;</button>
                    <div class="slider-images">
                        <img class="work-image" src="" alt="Работа">
                    </div>
                    <button class="slider-btn next">&#10095;</button>
                    <div class="image-counter"></div>
                </div>
                
            </div>
            <div class="work-sidebar">
                <div class="vertical-actions">
                    <button class="action-btn like-btn">
                        <img src="../img/heart.png" alt="like" id="likeIcon">
                        <span class="like-count">0</span>
                    </button>
                    <button class="action-btn comments-btn" id="openCommentsBtn">
                        <img src="../img/comment.png" alt="comments">
                    </button>
                    <button class="action-btn copy-link-btn">
                        <img src="../img/link.png" alt="copy">
                    </button>
                </div>
            </div>
        </div>
        <div class="work-details-area">
            <h3 class="work-author"></h3>
            <div class="work-description"></div>
            <div class="work-link"></div>
        </div>
    </div>
</div>

<!-- Модальное окно комментариев -->
<div id="commentsModal" class="modal-overlay" style="display: none;">
    <div class="modal-glass-card comments-modal">
        <button class="close-modal comments-close">&times;</button>
        <h3 class="comments-modal-title">Комментарии</h3>
        <div class="comments-list-full"></div>
        <div class="add-comment-full">
            <textarea placeholder="Напишите комментарий..."></textarea>
            <button class="send-comment-full">Отправить</button>
        </div>
    </div>
</div>

<div id="toastNotification" class="custom-toast">Ссылка скопирована</div>
    <script src="../auth.js"></script>
    <script src="../search/full-see.js"></script>
</body>
</html>
