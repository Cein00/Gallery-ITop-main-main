<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка работы</title>
    <link rel="stylesheet" href="../style.css">
    <script src="scriptUpload.js" defer></script>
    <script src="../theme-loader.js"></script>
</head>
<body class="search-page-body">
    <div class="login-glow"></div>

    <div class="app-container">
        <aside class="sidebar">
            <a href="../search/search.html"><div class="icon"><img src="../img/search.png" alt="Поиск"></div></a>
            <a href="../profile/profile.html"><div class="icon"><img src="../img/user.png" alt="Профиль"></div></a>
            <a href="../top/top.html"><div class="icon"><img src="../img/stats.png" alt="Топ"></div></a>
            <a href="../settings/settings.html"><div class="icon"><img src="../img/settings.png" alt="Настройки"></div></a>
        </aside>

        <main class="main-content glass-panel">
            <div class="upload-container">
                <div class="login-header">
                    <h2>ЗАГРУЗКА НОВОЙ РАБОТЫ</h2>
                    <p>Поделитесь своим творчеством</p>
                </div>

                <form id="uploadForm">
                    <!-- Динамическая сетка изображений -->
                    <div class="images-grid" id="imagesGrid">
                        <div class="image-upload-card add-card" id="addImageCard">
                            <div class="plus-icon">+</div>
                        </div>
                    </div>

                    <!-- Поле описания -->
                    <div class="input-modern">
                        <img src="../img/description.png" alt="" class="input-icon">
                        <textarea id="workDescription" rows="4" placeholder="Описание работы..."></textarea>
                    </div>

                    <!-- Поле ссылки -->
                    <div class="input-modern">
                        <img src="../img/link.png" alt="" class="input-icon">
                        <input type="url" id="workLink" placeholder="Ссылка на GitHub, Behance и т.д.">
                    </div>

                    <div class="action-buttons vertical-buttons modal-actions">
                        <button type="submit" class="button-modern submit-button">ОПУБЛИКОВАТЬ</button>
                        <a href="../search/search.html" class="button-link">ОТМЕНА</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <style>
        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .image-upload-card {
            aspect-ratio: 1 / 1;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(138,43,226,0.5);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .image-upload-card:hover {
            border-color: #8a2be2;
            background: rgba(138,43,226,0.1);
        }
        .add-card .plus-icon {
            font-size: 2.5rem;
            color: rgba(138,43,226,0.7);
        }
        .loaded-card {
            border: 2px solid rgba(138,43,226,0.6);
            background: transparent;
        }
        .uploaded-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .delete-image {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }
        .delete-image:hover {
            background: #ff4444;
            transform: scale(1.1);
        }
        .input-modern {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            padding: 0;
        }
        textarea::placeholder,
        input::placeholder {
            color: var(--text-main);
            opacity: 0.4;
        }
        .input-modern:focus-within textarea,
        .input-modern:focus-within input {
            border-color: #8a2be2;
        }
        .input-modern:focus-within .input-icon {
            opacity: 1;
        }
    </style>
</body>
</html>
