<!-- Модальное окно просмотра работы -->
<<div id="workModal" class="modal-overlay" style="display: none;">
    <div class="modal-work-container">
        <button class="close-modal work-close">&times;</button>
        <div class="work-main">
            <!-- Левая часть: изображение -->
            <div class="work-media-area">
                <div class="slider-container">
                    <button class="slider-btn prev">&#10094;</button>
                    <div class="slider-images">
                        <img class="work-image" src="" alt="Работа">
                    </div>
                    <button class="slider-btn next">&#10095;</button>
                    <div class="image-counter"></div>
                </div>
                
            </div>
            <!-- Правая часть: только иконки (вертикально, выровнены по центру) -->
            <div class="work-sidebar">
                <div class="vertical-actions">
                    <button class="action-btn like-btn">
                        <img src="../img/heart.png" alt="like" id="likeIcon">
                        <span class="like-count">0</span>
                    </button>
                    <button class="action-btn comments-btn" id="openCommentsBtn">
                        <img src="../img/comment.png" alt="comments">
                    </button>
                    <button class="action-btn copy-link-btn">
                        <img src="../img/link.png" alt="copy">
                    </button>
                </div>
            </div>
        </div>
        <!-- Блок с описанием – под изображением и иконками -->
        <div class="work-details-area">
            <h3 class="work-author"></h3>
            <div class="work-description"></div>
            <div class="work-link"></div>
        </div>
    </div>
</div>

<!-- Отдельное модальное окно для комментариев (без изменений) -->
<div id="commentsModal" class="modal-overlay" style="display: none;">
    <div class="modal-glass-card comments-modal">
        <button class="close-modal comments-close">&times;</button>
        <h3 class="comments-modal-title">Комментарии</h3>
        <div class="comments-list-full"></div>
        <div class="add-comment-full">
            <textarea placeholder="Напишите комментарий..."></textarea>
            <button class="send-comment-full">Отправить</button>
        </div>
    </div>
</div>

<div id="toastNotification" class="custom-toast">Ссылка скопирована</div>
